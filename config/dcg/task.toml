# Standalone DCG policy for unattended task worktrees.
#
# DCG_CONFIG replaces (rather than extends) the normal config in dcg 0.6.x,
# so this file deliberately carries the complete portable policy. It omits
# strict_git because that pack has no per-rule task exception in dcg 0.6.x;
# the unsafe half of that pack is reintroduced below as absolute blocks, while
# local rebase/amend/cherry-pick/staging remain usable in the isolated worktree.

[general]
color = "auto"
verbose = false
log_file = "~/.local/share/dcg/blocked.log"
self_heal_hook = false

[packs]
enabled = [
    "core.filesystem",
    "core.git",
    "infrastructure.terraform",
    "infrastructure.ansible",
    "cloud.aws",
    "apigateway.aws",
    "storage.s3",
    "kubernetes.kubectl",
    "kubernetes.helm",
    "kubernetes.kustomize",
    "database.postgresql",
    "database.mongodb",
    "database.redis",
    "containers.docker",
    "containers.podman",
    "system.disk",
    "system.permissions",
    "system.services",
    "remote.rsync",
    "remote.scp",
    "remote.ssh",
    "cicd.gitlab_ci",
    "cicd.github_actions",
    "cicd.jenkins",
    "secrets.aws_secrets",
    "secrets.vault",
    "platform.github",
    "platform.gitlab",
    "dns.cloudflare",
    "loadbalancer.elb",
    "loadbalancer.haproxy",
    "loadbalancer.nginx",
    "messaging.kafka",
    "messaging.rabbitmq",
    "messaging.sqs_sns",
    "monitoring.prometheus",
    "monitoring.pagerduty",
    "search.elasticsearch",
    "search.opensearch",
    "backup.rclone",
    "backup.restic",
    "package_managers",
]
disabled = []

[policy]

[policy.packs]

[policy.rules]

[interactive]
enabled = false
verification = "code"
timeout_seconds = 5
code_length = 4
max_attempts = 3
disable_in_ci = true
allow_non_tty_fallback = true

[heredoc]
enabled = true
timeout_ms = 50
fallback_on_parse_error = true
fallback_on_timeout = true

[overrides]
block = [
    { pattern = "git\\b.*?\\bpush\\b", reason = "Only the human user should push branches/remotes from an agent workflow" },
    { pattern = "git\\b.*?\\breset\\s+--hard\\b", reason = "Hard reset is outside the practical unattended Git profile" },
    { pattern = "git\\b.*?\\bworktree\\s+(?:remove|prune)\\b", reason = "Worktree cleanup must use the validated lifecycle path" },
    { pattern = "git\\b.*?\\bbranch\\s+-D\\b", reason = "Forced branch deletion is coordinator/human-owned" },
    { pattern = "git\\b.*?\\bfilter-(?:branch|repo)\\b", reason = "Repository-wide history rewriting is outside the task profile" },
    { pattern = "git\\b.*?\\breflog\\s+expire\\b", reason = "Recovery history must remain available" },
    { pattern = "git\\b.*?\\bgc\\s+.*--(?:aggressive|prune)\\b", reason = "Aggressive object pruning is outside the task profile" },
    { pattern = "git\\b.*?\\bsubmodule\\s+deinit\\b", reason = "Submodule removal is outside the task profile" },
]
