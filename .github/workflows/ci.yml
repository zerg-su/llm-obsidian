name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hermetic-macos:
    runs-on: macos-latest
    timeout-minutes: 35
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Reject whitespace errors
        run: git show --check --oneline --no-renames HEAD

      - name: Run hermetic suite
        run: make test

      - name: Verify generated Codex marketplace
        run: python3 scripts/codex-adapter.py --check
